<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Meme Factory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎭 Simple Meme Factory</h1>
  <p>Explore trending memes with a modern UI</p>

  <div class="controls">
    <button onclick="getRandomMeme()">🎲 Random</button>
    <button onclick="fetchMemes()">🔄 Refresh</button>

    <input type="text" id="searchInput" placeholder="Search memes...">

    <select id="sortSelect">
      <option value="">Sort</option>
      <option value="az">A-Z</option>
      <option value="za">Z-A</option>
    </select>

    <select id="filterSelect">
      <option value="">Filter</option>
      <option value="small">Width < 500</option>
      <option value="large">Width ≥ 500</option>
    </select>

    <button onclick="toggleDarkMode()">🌙 Mode</button>
  </div>

  <div id="loading" class="loading">Loading memes...</div>
  <div id="error" class="error"></div>

  <div id="memeGrid" class="grid"></div>

  <script src="script.js"></script>
</body>
</html>
